<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stack">
<title>Stack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #1c1c1e;
    --surface: #2c2c2e;
    --surface2: #3a3a3c;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0ee;
    --muted: rgba(240,240,238,0.45);
    --accent: #c8f542;
    --accent-dim: rgba(200,245,66,0.12);
    --skip-bg: rgba(255,255,255,0.04);
    --skip-text: rgba(240,240,238,0.2);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    padding-top: calc(var(--safe-top) + 16px);
    padding-bottom: calc(var(--safe-bottom) + 72px);
    padding-left: 16px;
    padding-right: 16px;
  }
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; }
  .header-left h1 { font-size: 28px; font-weight: 300; letter-spacing: -0.02em; line-height: 1; }
  .header-left .date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
  .prog-ring-wrap { position: relative; width: 52px; height: 52px; }
  .prog-ring-wrap svg { transform: rotate(-90deg); }
  .prog-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 3; }
  .prog-ring-fill { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset .4s ease; }
  .prog-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--accent); }
  .day-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 24px; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; padding: 7px 14px; border-radius: 40px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; background: transparent; color: var(--muted); transition: all .18s; font-family: 'DM Sans', sans-serif; }
  .day-tab.active { background: var(--accent); color: #0e0e0f; border-color: var(--accent); font-weight: 500; }
  .day-tab.today-marker { border-color: var(--accent); color: var(--accent); }
  .day-tab.today-marker.active { color: #0e0e0f; }
  .section { margin-bottom: 20px; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { display: flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 40px; border: 1px solid var(--border); font-size: 14px; cursor: pointer; background: var(--surface); color: var(--text); transition: all .15s; user-select: none; -webkit-user-select: none; }
  .pill:active { transform: scale(0.95); }
  .pill.checked { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .pill.skip { background: var(--skip-bg); border: 1px dashed rgba(255,255,255,0.1); color: var(--skip-text); text-decoration: line-through; cursor: default; }
  .dot { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid currentColor; flex-shrink: 0; }
  .pill.checked .dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 6px rgba(200,245,66,0.5); }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .all-done { text-align: center; padding: 12px 0 4px; font-size: 13px; color: var(--accent); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; opacity: 0; transition: opacity .4s; }
  .all-done.show { opacity: 1; }
  .streak { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 3px; letter-spacing: 0.04em; min-height: 16px; }
  .reset-btn { width: 100%; padding: 13px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; }
  .reset-btn:active { background: var(--surface2); }

  /* SUPPLEMENT DETAIL SHEET */
  .supp-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 300; display: none; }
  .supp-backdrop.open { display: block; background: rgba(0,0,0,0.55); }
  .supp-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #2c2c2e; border-radius: 22px 22px 0 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 301; padding: 0 20px calc(env(safe-area-inset-bottom,0px) + 36px); transform: translateY(100%); transition: transform .3s cubic-bezier(.32,1,.72,1); max-height: 82dvh; overflow-y: auto; }
  .supp-sheet.open { transform: translateY(0); }
  .supp-sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 14px auto 22px; }
  .supp-sheet-emoji { font-size: 36px; margin-bottom: 6px; line-height: 1; }
  .supp-sheet-name { font-size: 24px; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 4px; }
  .supp-sheet-dose { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 22px; line-height: 1.6; }
  .supp-sheet-sec { margin-bottom: 20px; }
  .supp-sheet-sec-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .supp-sheet-sec-body { font-size: 14px; line-height: 1.7; color: var(--text); }
  .supp-sheet-timing-chip { display: inline-block; padding: 5px 13px; border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .supp-sheet-divider { height: 1px; background: var(--border); margin: 4px 0 20px; }
  .pill.has-detail { position: relative; }

  /* AUTH MODAL */
  .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 320px; }
  .auth-title { font-size: 18px; font-weight: 500; margin-bottom: 20px; }
  .auth-input { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; margin-bottom: 10px; outline: none; box-sizing: border-box; }
  .auth-input:focus { border-color: rgba(200,245,66,0.4); }
  .auth-error { font-size: 12px; color: #ff6b6b; margin-bottom: 12px; min-height: 16px; font-family: 'DM Mono', monospace; }
  .auth-submit { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--accent); color: #0e0e0f; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 10px; }
  .auth-submit:active { opacity: 0.85; }
  .auth-toggle { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 8px; }
  .auth-forgot { width: 100%; padding: 7px; border: none; background: transparent; color: rgba(200,245,66,0.5); font-size: 12px; cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; margin-bottom: 4px; display: none; }
  .auth-cancel { width: 100%; padding: 9px; border: none; background: transparent; color: rgba(240,240,238,0.3); font-size: 12px; cursor: pointer; font-family: 'DM Mono', sans-serif; letter-spacing: 0.04em; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(28,28,30,0.94); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.08); padding-bottom: env(safe-area-inset-bottom, 0px); }
  .nav-btn { flex: 1; padding: 14px 0; background: transparent; border: none; color: rgba(240,240,238,0.45); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; }
  .nav-btn.active { color: #c8f542; }

  /* LOG */
  #log-view { display: none; }
  .log-month { margin-bottom: 28px; }
  .log-month-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(240,240,238,0.45); margin-bottom: 12px; }
  .log-day { background: #2c2c2e; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px; overflow: hidden; }
  .log-day-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
  .log-day-left { display: flex; align-items: center; gap: 10px; }
  .log-day-name { font-size: 14px; font-weight: 500; color: #f0f0ee; }
  .log-day-date { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(240,240,238,0.45); }
  .log-pct { font-family: 'DM Mono', monospace; font-size: 12px; color: #c8f542; }
  .log-pct.zero { color: rgba(240,240,238,0.45); }
  .log-body { display: none; padding: 0 14px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .log-body.open { display: block; }
  .log-section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(240,240,238,0.45); margin: 10px 0 6px; }
  .log-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .log-pill { padding: 4px 10px; border-radius: 40px; font-size: 12px; border: 1px solid rgba(255,255,255,0.08); color: rgba(240,240,238,0.45); }
  .log-pill.taken { border-color: #c8f542; color: #c8f542; background: rgba(200,245,66,0.12); }
  .log-empty { text-align: center; padding: 48px 0; font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(240,240,238,0.45); letter-spacing: 0.06em; }
</style>
</head>
<body>

<div id="today-view">
  <div class="header">
    <div class="header-left">
      <h1>Stack</h1>
      <div class="date" id="date-label"></div>
      <div class="streak" id="streak-label"></div>
    </div>
    <button id="auth-btn" onclick="handleSignIn()" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(240,240,238,0.55);padding:6px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;">Sign in</button>
    <div class="prog-ring-wrap">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle class="prog-ring-bg" cx="26" cy="26" r="22"/>
        <circle class="prog-ring-fill" id="prog-ring" cx="26" cy="26" r="22" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
      </svg>
      <div class="prog-center" id="prog-pct">0%</div>
    </div>
  </div>
  <div class="day-tabs" id="day-tabs"></div>
  <div id="schedule"></div>
  <div class="all-done" id="all-done">✦ all done for today</div>
  <button class="reset-btn" onclick="resetDay()">Reset day</button>
</div>

<div id="log-view">
  <div class="header" style="margin-bottom:16px;">
    <div class="header-left">
      <h1>Log</h1>
      <div class="date" id="log-subtitle"></div>
    </div>
  </div>
  <div id="log-content"></div>
  <div style="display:flex;gap:8px;padding:20px 0 8px;">
    <button onclick="exportBackup()" style="flex:1;padding:12px;border-radius:12px;background:rgba(200,245,66,0.08);border:1px solid rgba(200,245,66,0.25);color:#c8f542;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.05em;cursor:pointer;">↓ Export Backup</button>
    <button onclick="document.getElementById('import-input').click()" style="flex:1;padding:12px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(240,240,238,0.55);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.05em;cursor:pointer;">↑ Restore Backup</button>
    <input id="import-input" type="file" accept=".json" style="display:none" onchange="importBackup(this)">
  </div>
</div>

<div id="auth-overlay" class="auth-overlay" style="display:none">
  <div class="auth-card">
    <div class="auth-title" id="auth-modal-title">Sign in</div>
    <input id="auth-email" class="auth-input" type="email" placeholder="Email" autocomplete="email">
    <input id="auth-password" class="auth-input" type="password" placeholder="Password" autocomplete="current-password">
    <div class="auth-error" id="auth-error"></div>
    <button id="auth-submit-btn" class="auth-submit" onclick="submitAuth()">Sign in</button>
    <button class="auth-toggle" id="auth-toggle-btn" onclick="toggleAuthMode()">Create account instead</button>
    <button class="auth-forgot" id="auth-forgot-btn" onclick="sendPasswordReset()">Forgot password?</button>
    <button class="auth-cancel" onclick="closeAuthModal()">Cancel</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="showView('today')">Today</button>
  <button class="nav-btn" id="nav-log" onclick="showView('log')">Log</button>
</div>

<!-- Supplement detail bottom sheet -->
<div class="supp-backdrop" id="supp-backdrop" onclick="closeSuppSheet()"></div>
<div class="supp-sheet" id="supp-sheet">
  <div class="supp-sheet-handle"></div>
  <div class="supp-sheet-emoji" id="ss-emoji"></div>
  <div class="supp-sheet-name" id="ss-name"></div>
  <div class="supp-sheet-dose" id="ss-dose"></div>
  <div class="supp-sheet-divider"></div>
  <div class="supp-sheet-sec">
    <div class="supp-sheet-sec-label">Why I take it</div>
    <div class="supp-sheet-sec-body" id="ss-why"></div>
  </div>
  <div class="supp-sheet-sec">
    <div class="supp-sheet-sec-label">How it works</div>
    <div class="supp-sheet-sec-body" id="ss-mech"></div>
  </div>
  <div class="supp-sheet-sec">
    <div class="supp-sheet-sec-label">Timing</div>
    <div class="supp-sheet-timing-chip" id="ss-timing"></div>
  </div>
</div>

<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const SCHEDULE = {
  Sunday: [
    {time:'Fasted', items:['NMN','TMG','B12'], skip:[]},
    {time:'Post (Shake)', items:['Protein','Creatine','EVOO','🐟','Taurine'], skip:[]},
    {time:'Lunch', items:['Probiotic','P5P','Fisetin','Duta','Boron'], skip:[]},
    {time:'Night', items:['Mag','Zinc','Glycine'], skip:[]},
    {time:'Skip', items:['NAC','TUDCA','Tongkat'], skip:['NAC','TUDCA','Tongkat']},
  ],
  Monday: [
    {time:'Fasted', items:['NMN','NAC','TMG','B12'], skip:[]},
    {time:'Pre', items:['Matcha','Citrulline'], skip:[]},
    {time:'Post (Shake)', items:['Protein','Creatine','EVOO','Vit D','K2','🐟','Taurine'], skip:[]},
    {time:'Lunch', items:['Tongkat','TUDCA','Garlic','Ginger','Vit C','P5P','Probiotic','Duta','Boron'], skip:[]},
    {time:'Night', items:['Mag','Zinc','Ash/Api','Glycine'], skip:[]},
  ],
  Tuesday: [
    {time:'Fasted', items:['NMN','NAC','TMG','B12'], skip:[]},
    {time:'Pre', items:['Matcha','Citrulline'], skip:[]},
    {time:'Post (Shake)', items:['Protein','Creatine','EVOO','Vit D','K2','🐟','Taurine'], skip:[]},
    {time:'Lunch', items:['Tongkat','TUDCA','Garlic','Ginger','Vit C','P5P','Probiotic','Duta','Boron'], skip:[]},
    {time:'Night', items:['Mag','Zinc','Ash/Api','Glycine'], skip:[]},
  ],
  Wednesday: [
    {time:'Fasted', items:['NMN','NAC','TMG','B12'], skip:[]},
    {time:'Pre', items:['Matcha','Citrulline'], skip:[]},
    {time:'Post (Shake)', items:['Protein','Creatine','EVOO','Vit D','K2','🐟','Taurine'], skip:[]},
    {time:'Lunch', items:['Garlic','Ginger','Vit C','P5P','Probiotic','Duta','Boron'], skip:[]},
    {time:'Night', items:['Mag','Ash/Api','Glycine'], skip:[]},
    {time:'Skip', items:['Tongkat','TUDCA'], skip:['Tongkat','TUDCA']},
  ],
  Thursday: [
    {time:'Fasted', items:['NMN','NAC','TMG','B12'], skip:[]},
    {time:'Pre', items:['Matcha','Citrulline'], skip:[]},
    {time:'Post (Shake)', items:['Protein','Creatine','EVOO','Vit D','K2','🐟','Taurine'], skip:[]},
    {time:'Lunch', items:['Tongkat','TUDCA','Garlic','Ginger','Vit C','P5P','Probiotic','Duta','Boron'], skip:[]},
    {time:'Night', items:['Mag','Zinc','Ash/Api','Glycine'], skip:[]},
  ],
  Friday: [
    {time:'Fasted', items:['NMN','NAC','TMG','B12'], skip:[]},
    {time:'Pre', items:['Matcha','Citrulline'], skip:[]},
    {time:'Post (Shake)', items:['Protein','Creatine','EVOO','Vit D','K2','🐟','Taurine'], skip:[]},
    {time:'Lunch', items:['Garlic','Ginger','Vit C','P5P','Probiotic','Duta','Boron'], skip:[]},
    {time:'Night', items:['Mag','Zinc','Ash/Api','Glycine'], skip:[]},
    {time:'Skip', items:['Tongkat','TUDCA'], skip:['Tongkat','TUDCA']},
  ],
  Saturday: [
    {time:'Fasted', items:['NMN','TMG','B12'], skip:[]},
    {time:'Pre', items:['Matcha'], skip:[]},
    {time:'Post (Shake)', items:['Protein','Creatine','EVOO','🐟','Taurine'], skip:[]},
    {time:'Lunch', items:['Probiotic','P5P','Fisetin','Duta','Boron'], skip:[]},
    {time:'Night', items:['Mag','Glycine'], skip:[]},
    {time:'Skip', items:['NAC','Tongkat','TUDCA','Garlic','Ginger'], skip:['NAC','Tongkat','TUDCA','Garlic','Ginger']},
  ],
};

// --- Supplement detail sheet ---
const SUPP_MAP = {
  'NMN':'nmn','TMG':'tmg','B12':'b12','NAC':'nac',
  'Matcha':'matcha','Citrulline':'citrulline',
  'Protein':'protein','Creatine':'creatine','EVOO':'evoo',
  '🐟':'fishoil','Taurine':'taurine',
  'Tongkat':'tongkat','TUDCA':'tudca',
  'Garlic':'garlic','Ginger':'ginger','Vit C':'vitc',
  'P5P':'p5p','Probiotic':'probiotic','Duta':'dutasteride',
  'Boron':'boron','Mag':'magnesium','Zinc':'zinc',
  'Ash/Api':'ashwagandha','Glycine':'glycine','Fisetin':'fisetin',
  'Vit D':'vitd','K2':'k2'
};

function getSuppData(name) {
  const id = SUPP_MAP[name];
  if (!id) return null;
  const SUPPS = (window.parent && window.parent.HSA && window.parent.HSA.SUPPLEMENTS) || [];
  return SUPPS.find(s => s.id === id) || null;
}

function openSuppSheet(name) {
  const s = getSuppData(name);
  if (!s) return;
  document.getElementById('ss-emoji').textContent = s.emoji || '';
  document.getElementById('ss-name').textContent = s.name;
  document.getElementById('ss-dose').textContent = s.dosage + (s.dosageNote ? '\n' + s.dosageNote : '');
  document.getElementById('ss-why').textContent = s.whyITakeIt || s.whatItIs || '';
  document.getElementById('ss-mech').textContent = s.mechanism || s.whatItIs || '';
  document.getElementById('ss-timing').textContent = '⏱ ' + (s.timing || s.dosageNote || 'See schedule');
  document.getElementById('supp-backdrop').classList.add('open');
  document.getElementById('supp-sheet').classList.add('open');
}

function closeSuppSheet() {
  document.getElementById('supp-backdrop').classList.remove('open');
  document.getElementById('supp-sheet').classList.remove('open');
}

let _lpTimer = null;
let _lpFired = false;

function attachLongPress(el, name) {
  if (!SUPP_MAP[name]) return; // no data, skip
  el.classList.add('has-detail');
  function onStart(e) {
    _lpFired = false;
    _lpTimer = setTimeout(() => {
      _lpFired = true;
      // Provide haptic feedback on iOS
      if (navigator.vibrate) navigator.vibrate(10);
      openSuppSheet(name);
    }, 480);
  }
  function onCancel() { clearTimeout(_lpTimer); }
  el.addEventListener('touchstart', onStart, { passive: true });
  el.addEventListener('touchend', onCancel);
  el.addEventListener('touchmove', onCancel, { passive: true });
  el.addEventListener('mousedown', onStart);
  el.addEventListener('mouseup', onCancel);
  el.addEventListener('mouseleave', onCancel);
}

// --- Date helpers ---
function dateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDateStr(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function dateForDayIndex(i) {
  const now = new Date();
  const diff = (now.getDay() - i + 7) % 7;
  const d = new Date(now); d.setDate(now.getDate()-diff); return d;
}

// --- IndexedDB ---
const IDB = { db: null };
function openDB() {
  return new Promise((res,rej) => {
    const r = indexedDB.open('suppLog2', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('c');
    r.onsuccess = e => { IDB.db = e.target.result; res(); };
    r.onerror = rej;
  });
}
function idbOp(mode, fn) {
  return new Promise((res,rej) => {
    if (!IDB.db) { res(null); return; }
    const tx = IDB.db.transaction('c', mode);
    const s = tx.objectStore('c');
    const r = fn(s);
    if (r) r.onsuccess = () => res(r.result);
    tx.oncomplete = () => res(null);
    tx.onerror = rej;
  });
}
const idbSet = k => idbOp('readwrite', s => s.put(1, k));
const idbDel = k => idbOp('readwrite', s => s.delete(k));

// Fallback localStorage helpers
function lsSet(k) { try { localStorage.setItem(k,'1'); } catch(e){} }
function lsDel(k) { try { localStorage.removeItem(k); } catch(e){} }
function lsAll() { const out=[]; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('sl2|'))out.push(k);} return out; }

// Local-only helpers (no cloud sync — used internally)
async function localSet(k) { IDB.db ? await idbSet(k) : lsSet(k); }
async function localDel(k) { IDB.db ? await idbDel(k) : lsDel(k); }

// Unified storage (local + cloud)
async function storeSet(k) { await localSet(k); await cloudSet(k); }
async function storeDel(k) { await localDel(k); await cloudDel(k); }
async function storeAll() {
  if (IDB.db) { const keys = await idbOp('readonly', s=>s.getAllKeys()); return (keys||[]).filter(k=>String(k).startsWith('sl2|')); }
  return lsAll();
}

function makeKey(ds, item) { return 'sl2|'+ds+'|'+item; }

let checked = new Set();

async function loadAll() {
  const keys = await storeAll();
  checked = new Set((keys||[]).map(String));
}

function isChecked(ds, item) { return checked.has(makeKey(ds,item)); }

async function toggle(ds, item) {
  const k = makeKey(ds,item);
  if (checked.has(k)) { checked.delete(k); await storeDel(k); }
  else { checked.add(k); await storeSet(k); }
  render();
}

async function resetDay() {
  if (!confirm('Reset all checks for this day?')) return;
  const ds = dateStr(dateForDayIndex(activeDayIdx));
  const pre = 'sl2|'+ds+'|';
  const toRemove = [...checked].filter(k=>k.startsWith(pre));
  for (const k of toRemove) { checked.delete(k); await storeDel(k); }
  render();
}

// --- App state ---
let activeDayIdx = new Date().getDay();
let currentView = 'today';

function showView(v) {
  currentView = v;
  document.getElementById('today-view').style.display = v==='today'?'':'none';
  document.getElementById('log-view').style.display = v==='log'?'block':'none';

// --- Streak ---
function calcStreak() {
  const now = new Date();
  let streak = 0;
  let todaySkipped = false;
  for (let i = 0; i < 365; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    const ds = dateStr(d);
    const sched = SCHEDULE[DAYS[d.getDay()]] || [];
    const takeable = sched.flatMap(s => s.items.filter(it => !s.skip.includes(it)));
    if (!takeable.length) continue;
    const done = takeable.filter(it => isChecked(ds, it)).length;
    if (done === takeable.length) {
      streak++;
    } else if (i === 0 && !todaySkipped) {
      todaySkipped = true;
    } else {
      break;
    }
  }
  return streak;
}

// --- Render today ---
function renderTabs() {
  const c = document.getElementById('day-tabs');
  c.innerHTML = '';
  DAYS.forEach((d,i) => {
    const b = document.createElement('button');
    const isToday = i===new Date().getDay(), isActive = i===activeDayIdx;
    b.className = 'day-tab'+(isActive?' active':'')+(isToday&&!isActive?' today-marker':'');
    b.textContent = SHORT[i];
    b.onclick = () => { activeDayIdx=i; render(); };
    c.appendChild(b);
    if (isActive) setTimeout(()=>b.scrollIntoView({inline:'center',behavior:'smooth'}),50);
  });
}

function renderSchedule() {
  const dayName = DAYS[activeDayIdx];
  const ds = dateStr(dateForDayIndex(activeDayIdx));
  const sched = SCHEDULE[dayName]||[];
  const takeable = sched.flatMap(s=>s.items.filter(it=>!s.skip.includes(it)));
  const done = takeable.filter(it=>isChecked(ds,it)).length;
  const total = takeable.length;
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('prog-ring').style.strokeDashoffset = 138.2-(138.2*pct/100);
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('all-done').classList.toggle('show', total>0&&done===total);

  const c = document.getElementById('schedule'); c.innerHTML='';
  sched.forEach((section,si) => {
    if (!section.items.length) return;
    if (si>0) { const dv=document.createElement('div'); dv.className='divider'; c.appendChild(dv); }
    const sec=document.createElement('div'); sec.className='section';
    const lbl=document.createElement('div'); lbl.className='section-label'; lbl.textContent=section.time; sec.appendChild(lbl);
    const row=document.createElement('div'); row.className='pill-row';
    section.items.forEach(item => {
      const isSkip=section.skip.includes(item);
      const pill=document.createElement('div');
      pill.className='pill'+(isSkip?' skip':isChecked(ds,item)?' checked':'');
      if (!isSkip) {
        pill.onclick=()=>{ if(_lpFired){_lpFired=false;return;} toggle(ds,item); };
        attachLongPress(pill, item);
        const dot=document.createElement('div'); dot.className='dot'; pill.appendChild(dot);
      }
      const txt=document.createElement('span'); txt.textContent=item; pill.appendChild(txt);
      row.appendChild(pill);
    });
    sec.appendChild(row); c.appendChild(sec);
  });
}

function render() {
  const selectedDate = dateForDayIndex(activeDayIdx);
  document.getElementById('date-label').textContent = selectedDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const streak = calcStreak();
  document.getElementById('streak-label').textContent = streak > 0 ? streak + ' day streak' : '';
  renderTabs(); renderSchedule();
}

// --- Render log ---
function renderLog() {
  const c = document.getElementById('log-content');
  const sub = document.getElementById('log-subtitle');
  c.innerHTML = '';

  const byDate = {};
  checked.forEach(k => {
    const parts = k.split('|');
    if (parts.length < 3) return;
    const ds = parts[1], item = parts.slice(2).join('|');
    if (!byDate[ds]) byDate[ds] = new Set();
    byDate[ds].add(item);
  });

  // Always show last 14 days; also surface older days with entries
  const shown = new Set();
  const now = new Date();
  for (let i = 0; i < 14; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    shown.add(dateStr(d));
  }
  Object.keys(byDate).forEach(ds => shown.add(ds));

  const dates = [...shown].sort((a, b) => b.localeCompare(a));
  const loggedCount = Object.keys(byDate).length;
  sub.textContent = loggedCount + ' day' + (loggedCount !== 1 ? 's' : '') + ' logged';

  if (!dates.length) {
    c.innerHTML = '<div class="log-empty">no entries yet</div>';
    return;
  }

  const byMonth = {};
  dates.forEach(ds => {
    const d = parseDateStr(ds);
    const mk = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (!byMonth[mk]) byMonth[mk] = [];
    byMonth[mk].push(ds);
  });

  Object.keys(byMonth).sort((a, b) => b.localeCompare(a)).forEach(mk => {
    const [y, m] = mk.split('-');
    const monthLabel = new Date(+y, +m-1, 1).toLocaleDateString('en-US', {month:'long', year:'numeric'});

    const monthEl = document.createElement('div');
    monthEl.className = 'log-month';

    const mlbl = document.createElement('div');
    mlbl.className = 'log-month-label';
    mlbl.textContent = monthLabel;
    monthEl.appendChild(mlbl);

    byMonth[mk].forEach(ds => {
      const d = parseDateStr(ds);
      const dayName = DAYS[d.getDay()];
      const sched = SCHEDULE[dayName] || [];
      const taken = byDate[ds] || new Set();
      const takeable = sched.flatMap(s => s.items.filter(it => !s.skip.includes(it)));
      const doneCount = takeable.filter(it => taken.has(it)).length;
      const total = takeable.length;
      const pct = total ? Math.round(doneCount / total * 100) : 0;

      const dayEl = document.createElement('div');
      dayEl.className = 'log-day';

      const hdr = document.createElement('div');
      hdr.className = 'log-day-header';

      const left = document.createElement('div');
      left.className = 'log-day-left';

      const dn = document.createElement('span');
      dn.className = 'log-day-name';
      dn.textContent = dayName;

      const dd = document.createElement('span');
      dd.className = 'log-day-date';
      dd.textContent = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});

      left.appendChild(dn); left.appendChild(dd);

      const pe = document.createElement('span');
      pe.className = 'log-pct' + (pct === 0 ? ' zero' : '');
      pe.textContent = pct + '%';

      hdr.appendChild(left); hdr.appendChild(pe);

      const body = document.createElement('div');
      body.className = 'log-body';

      sched.forEach(section => {
        const tbl = section.items.filter(it => !section.skip.includes(it));
        if (!tbl.length) return;

        const sl = document.createElement('div');
        sl.className = 'log-section-label';
        sl.textContent = section.time;
        body.appendChild(sl);

        const pr = document.createElement('div');
        pr.className = 'log-pills';

        tbl.forEach(item => {
          const p = document.createElement('span');
          p.className = 'log-pill' + (taken.has(item) ? ' taken' : '');
          p.textContent = item;
          pr.appendChild(p);
        });
        body.appendChild(pr);
      });

      hdr.onclick = () => body.classList.toggle('open');
      dayEl.appendChild(hdr); dayEl.appendChild(body); monthEl.appendChild(dayEl);
    });
    c.appendChild(monthEl);
  });
}

// --- Backup / Restore ---
async function exportBackup() {
  const keys = await storeAll();
  const data = { version: 1, exported: new Date().toISOString(), entries: keys };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stack-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

async function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { alert('Invalid backup file.'); return; }
  const entries = Array.isArray(data) ? data : (data.entries || []);
  for (const k of entries) { checked.add(k); await storeSet(k); }
  input.value = '';
  render();
  alert('Restored ' + entries.length + ' check-ins.');
}

const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;

function userDoc() { return db.collection('users').doc(currentUser.uid); }

async function cloudSet(k) {
  if (!currentUser) return;
  try {
    await userDoc().set({ checkins: firebase.firestore.FieldValue.arrayUnion(k) }, { merge: true });
  } catch(e) { console.warn('cloudSet failed', e); }
}

async function cloudDel(k) {
  if (!currentUser) return;
  try {
    await userDoc().update({ checkins: firebase.firestore.FieldValue.arrayRemove(k) });
  } catch(e) { console.warn('cloudDel failed', e); }
}

async function cloudLoad() {
  if (!currentUser) return;
  try {
    const snap = await userDoc().get();
    if (snap.exists) {
      const cloudKeys = snap.data().checkins || [];
      // Merge cloud into local — use localSet to avoid re-uploading
      for (const k of cloudKeys) {
        if (!checked.has(k)) { checked.add(k); await localSet(k); }
      }
      // Push any local-only keys up to cloud
      const localOnly = [...checked].filter(k => !cloudKeys.includes(k));
      if (localOnly.length) {
        await userDoc().set({ checkins: firebase.firestore.FieldValue.arrayUnion(...localOnly) }, { merge: true });
      }
    } else {
      // First sign-in: upload all local data
      const keys = [...checked];
      if (keys.length) await userDoc().set({ checkins: keys });
    }
  } catch(e) { console.warn('cloudLoad failed', e); }
}

function updateAuthBtn() {
  const btn = document.getElementById('auth-btn');
  if (!btn) return;
  if (currentUser) {
    const name = currentUser.displayName ? currentUser.displayName.split(' ')[0] : currentUser.email.split('@')[0];
    btn.textContent = '✓ ' + name;
    btn.style.color = '#c8f542';
    btn.style.borderColor = 'rgba(200,245,66,0.3)';
  } else {
    btn.textContent = 'Sign in';
    btn.style.color = 'rgba(240,240,238,0.55)';
    btn.style.borderColor = 'rgba(255,255,255,0.12)';
  }
}

let authMode = 'signin';

function showAuthModal() {
  authMode = 'signin';
  document.getElementById('auth-modal-title').textContent = 'Sign in';
  document.getElementById('auth-toggle-btn').textContent = 'Create account instead';
  document.getElementById('auth-submit-btn').textContent = 'Sign in';
  document.getElementById('auth-forgot-btn').style.display = 'block';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
  document.getElementById('auth-error').textContent = '';
  document.getElementById('auth-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('auth-email').focus(), 50);
}

function closeAuthModal() {
  document.getElementById('auth-overlay').style.display = 'none';
}

function toggleAuthMode() {
  authMode = authMode === 'signin' ? 'create' : 'signin';
  const isCreate = authMode === 'create';
  document.getElementById('auth-modal-title').textContent = isCreate ? 'Create account' : 'Sign in';
  document.getElementById('auth-toggle-btn').textContent = isCreate ? 'Sign in instead' : 'Create account instead';
  document.getElementById('auth-submit-btn').textContent = isCreate ? 'Create account' : 'Sign in';
  document.getElementById('auth-forgot-btn').style.display = isCreate ? 'none' : 'block';
  document.getElementById('auth-error').textContent = '';
}

async function sendPasswordReset() {
  const email = document.getElementById('auth-email').value.trim();
  const errEl = document.getElementById('auth-error');
  if (!email) { errEl.textContent = 'Enter your email above first.'; return; }
  try {
    await auth.sendPasswordResetEmail(email);
    errEl.style.color = '#c8f542';
    errEl.textContent = 'Reset email sent — check your inbox.';
  } catch(e) {
    errEl.style.color = '#ff6b6b';
    const msgs = { 'auth/user-not-found': 'No account found with this email.', 'auth/invalid-email': 'Invalid email address.' };
    errEl.textContent = msgs[e.code] || 'Could not send reset email.';
  }
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Email and password required.'; return; }
  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;
  try {
    if (authMode === 'create') {
      await auth.createUserWithEmailAndPassword(email, password);
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
    closeAuthModal();
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'An account with this email already exists.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-credential': 'Incorrect email or password.',
      'auth/too-many-requests': 'Too many attempts. Try again later.'
    };
    errEl.textContent = msgs[e.code] || 'Something went wrong. Try again.';
  } finally {
    btn.disabled = false;
  }
}

function handleSignIn() {
  if (currentUser) {
    if (confirm('Sign out of cloud sync?')) auth.signOut();
    return;
  }
  showAuthModal();
}

auth.onAuthStateChanged(async user => {
  currentUser = user;
  updateAuthBtn();
  if (user) {
    await cloudLoad();
    render();
    if (currentView === 'log') renderLog();
  }
});
